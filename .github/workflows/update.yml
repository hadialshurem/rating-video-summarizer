name: Summarize New Videos

on:
  schedule:
    # Run at 00:00 every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  run-summarizer:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push index.html back to the repo
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Summarization Script
      env:
        # Example using Gemini (Faster/Cheaper)
        # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        
        # Example using OpenAI (or compatible API)
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        # LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }} # Optional
        LLM_MODEL: "gpt-4o-mini" 
      run: python scripts/summarize.py
      
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: generate latest video summaries 🤖" && git push)
